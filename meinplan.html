<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="BM2026">
<link rel="apple-touch-icon" href="bm2026-icon.png">
<link rel="manifest" href="manifest.json">
<title>BM2026 – Mein Plan</title>
<style>
  :root {
    --bg:#080b14; --surface:#0f1422; --border:#1e2a40;
    --text:#d4daf0; --muted:#5a6688;
    --aurum:#a855f7; --curame:#10b981; --prism:#3b82f6;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    background:var(--bg); color:var(--text);
    font-family:'Segoe UI',system-ui,sans-serif;
    padding:20px 14px 60px; max-width:700px; margin:0 auto;
  }
  header { text-align:center; margin-bottom:20px; }
  header h1 {
    font-size:20px; font-weight:800; letter-spacing:2px; text-transform:uppercase;
    background:linear-gradient(90deg,#10b981,#a855f7);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    margin-bottom:4px;
  }
  header p { color:var(--muted); font-size:12px; }

  .nav { display:flex; gap:6px; justify-content:center; margin-bottom:20px; flex-wrap:wrap; }
  .nav a {
    padding:7px 14px; border-radius:999px; border:1px solid var(--border);
    background:var(--surface); color:var(--muted); text-decoration:none;
    font-size:12px; font-weight:600; touch-action:manipulation;
    -webkit-tap-highlight-color:transparent; min-height:40px;
    display:inline-flex; align-items:center;
  }
  .nav a.active { background:#051a10; color:#6ee7b7; border-color:var(--curame); }

  .empty-state {
    text-align:center; padding:40px 20px;
    background:var(--surface); border:1px solid var(--border); border-radius:10px;
    color:var(--muted); font-size:13px; line-height:1.8;
  }
  .empty-state .big { font-size:32px; margin-bottom:12px; display:block; }
  .empty-state a { color:#3b82f6; text-decoration:none; font-weight:600; }

  /* Day sections */
  .day-section { margin-bottom:24px; }
  .day-label {
    font-size:12px; font-weight:700; letter-spacing:1px; text-transform:uppercase;
    color:var(--muted); padding:6px 0 8px;
    border-bottom:1px solid var(--border); margin-bottom:0;
  }

  /* Plan rows */
  .plan-row {
    display:grid; grid-template-columns:56px 1fr auto;
    align-items:start; padding:9px 14px 9px 18px;
    border-bottom:1px solid #0f1728; background:var(--surface);
    border-left:1px solid var(--border); border-right:1px solid var(--border);
    gap:10px; position:relative; transition:background 0.15s;
  }
  .plan-row:hover { background:#121a2e; }
  .plan-row:first-of-type { border-top:1px solid var(--border); }
  .plan-row:last-of-type { border-bottom:1px solid var(--border); border-radius:0 0 8px 8px; }
  .plan-row::before {
    content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
  }
  .plan-row.stage-aurum::before  { background:var(--aurum); }
  .plan-row.stage-curame::before { background:var(--curame); }
  .plan-row.stage-prism::before  { background:var(--prism); }

  .ptime { font-size:11px; color:var(--muted); font-variant-numeric:tabular-nums; padding-top:2px; }
  .pinfo {}
  .pname { font-size:13px; font-weight:700; color:var(--text); }
  .psub  { font-size:10px; color:var(--muted); margin-top:2px; display:flex; gap:6px; align-items:center; }
  .stage-chip {
    display:inline-block; padding:1px 6px; border-radius:3px;
    font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px;
  }
  .chip-aurum  { background:#1a0a30; color:#c4b5fd; border:1px solid #a855f744; }
  .chip-curame { background:#051a10; color:#6ee7b7; border:1px solid #10b98144; }
  .chip-prism  { background:#071828; color:#93c5fd; border:1px solid #3b82f644; }

  .badge {
    width:38px; height:26px; border-radius:5px; display:flex; align-items:center;
    justify-content:center; font-size:11px; font-weight:700; flex-shrink:0; align-self:start;
  }
  .bd9  { background:#4a0070; color:#e879f9; border:1px solid #c026d3; }
  .bd8  { background:#0f2060; color:#93c5fd; border:1px solid #2563eb; }
  .bd7  { background:#072830; color:#67e8f9; border:1px solid #0891b2; }
  .bd-  { background:#141414; color:#444;    border:1px solid #222; font-size:9px; }

  /* Conflict marker */
  .conflict-row {
    background:#1a0808; border-left:3px solid #ef4444;
    font-size:11px; color:#f87171; padding:6px 14px;
    border-bottom:1px solid #0f1728;
    border-right:1px solid var(--border);
  }

  /* Remove button */
  .remove-btn {
    position:absolute; top:6px; right:8px;
    background:none; border:none; color:#2a3a50; font-size:14px;
    cursor:pointer; padding:2px 4px; touch-action:manipulation;
    font-family:inherit; line-height:1;
    transition:color 0.15s;
  }
  .remove-btn:hover { color:#f87171; }

  /* Share / Export */
  .actions {
    display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-bottom:20px;
  }
  .action-btn {
    padding:8px 16px; border-radius:8px; border:1px solid var(--border);
    background:var(--surface); color:var(--muted); cursor:pointer;
    font-size:12px; font-weight:600; font-family:inherit; -webkit-appearance:none;
    touch-action:manipulation; min-height:38px; transition:all 0.15s;
    display:inline-flex; align-items:center; gap:6px;
  }
  .action-btn:active { transform:scale(0.96); }
  .action-btn.primary { background:#051a10; color:#6ee7b7; border-color:var(--curame); }

  /* Stats bar */
  .stats {
    background:var(--surface); border:1px solid var(--border); border-radius:8px;
    padding:10px 14px; margin-bottom:20px;
    display:flex; gap:16px; flex-wrap:wrap; justify-content:center;
  }
  .stat { text-align:center; }
  .stat-num { font-size:20px; font-weight:800; color:#6ee7b7; display:block; }
  .stat-lbl { font-size:10px; color:var(--muted); }

  .hidden { display:none !important; }
</style>
</head>
<body>

<header>
  <h1>📋 Mein Plan</h1>
  <p>Deine persönliche Auswahl für Burning Mountain 2026</p>
</header>

<div class="nav">
  <a href="index.html">← Zeitplan</a>
  <a href="crossover.html">🎪 Crossover</a>
  <a href="meinplan.html" class="active">📋 Mein Plan</a>
</div>

<div id="stats-bar" class="stats hidden">
  <div class="stat"><span class="stat-num" id="stat-total">0</span><span class="stat-lbl">Acts</span></div>
  <div class="stat"><span class="stat-num" id="stat-conflicts">0</span><span class="stat-lbl">Konflikte</span></div>
  <div class="stat"><span class="stat-num" id="stat-avg">–</span><span class="stat-lbl">Ø Rating</span></div>
</div>

<div class="actions" id="action-bar" style="display:none;">
  <button type="button" class="action-btn" id="btn-share">📤 Als Text teilen</button>
  <button type="button" class="action-btn" id="btn-clear-all">🗑 Alle löschen</button>
</div>

<div id="plan-content"></div>

<div id="empty-state" class="empty-state">
  <span class="big">🎪</span>
  Dein Plan ist noch leer.<br><br>
  Gehe zum <a href="index.html">Zeitplan</a> und tippe bei jedem Act auf<br>
  <strong>☆ Zu meinem Plan</strong> um ihn hinzuzufügen.<br><br>
  <span style="font-size:11px; color:#3a4a60;">Dein Plan wird automatisch gespeichert.</span>
</div>

<script>
(function() {

var PLAN_KEY   = 'bm2026_plan';
var STORE_KEY  = 'bm2026_v1';
var myPlan     = {};
var ownRatings = {};
try { myPlan     = JSON.parse(localStorage.getItem(PLAN_KEY)  || '{}') || {}; } catch(e) {}
try { ownRatings = JSON.parse(localStorage.getItem(STORE_KEY) || '{}') || {}; } catch(e) {}

function savePlan() { try { localStorage.setItem(PLAN_KEY, JSON.stringify(myPlan)); } catch(e) {} }

// Day order and labels
var DAY_ORDER  = ['thu','fri','sat','sun'];
var DAY_LABELS = { thu:'Donnerstag, 25. Juni', fri:'Freitag, 26. Juni', sat:'Samstag, 27. Juni', sun:'Sonntag, 28. Juni' };
var DAY_SHORT  = { thu:'Do 25.6.', fri:'Fr 26.6.', sat:'Sa 27.6.', sun:'So 28.6.' };

// Get Johannes rating from index.html data (we store it at plan time)
function getJRating(name) {
  // Try from ownRatings first, then return null
  var slug = name.toLowerCase().replace(/[^a-z0-9]+/g,'-').slice(0,36).replace(/-$/,'');
  return ownRatings[slug] !== undefined ? ownRatings[slug] : null;
}

function timeToMin(t) {
  if (!t) return 9999;
  var p = t.trim().split(':');
  var h = parseInt(p[0]), m = parseInt(p[1]||0);
  // treat 00-05 as next day (after midnight)
  if (h < 6) h += 24;
  return h*60 + m;
}

function badgeCls(v) {
  if (v===null||v===undefined) return 'bd-';
  var n = parseFloat(v);
  return n>=9?'bd9':n>=8?'bd8':n>=7?'bd7':'bd-';
}

function stageChipCls(stage) {
  return stage==='aurum'?'chip-aurum':stage==='curame'?'chip-curame':'chip-prism';
}
function stageLabel(stage) {
  return stage==='aurum'?'Aurum':stage==='curame'?'Curame':stage==='prism'?'Prism':stage;
}

function render() {
  var keys = Object.keys(myPlan);
  var content = document.getElementById('plan-content');
  var empty   = document.getElementById('empty-state');
  var statsBar = document.getElementById('stats-bar');
  var actionBar = document.getElementById('action-bar');

  if (keys.length === 0) {
    content.innerHTML = '';
    empty.classList.remove('hidden');
    statsBar.classList.add('hidden');
    actionBar.style.display = 'none';
    return;
  }

  empty.classList.add('hidden');
  statsBar.classList.remove('hidden');
  actionBar.style.display = '';

  // Group by day, sort by time
  var byDay = {};
  DAY_ORDER.forEach(function(d) { byDay[d] = []; });

  keys.forEach(function(id) {
    var act = myPlan[id];
    if (!act) return;
    var day = act.day || 'fri';
    if (!byDay[day]) byDay[day] = [];
    byDay[day].push({ id:id, act:act });
  });

  DAY_ORDER.forEach(function(d) {
    byDay[d].sort(function(a,b) { return timeToMin(a.act.time) - timeToMin(b.act.time); });
  });

  // Detect conflicts (same day, overlapping times)
  function hasConflict(acts, i) {
    if (i === 0 || i >= acts.length) return false;
    var prev = acts[i-1];
    var curr = acts[i];
    // If they're on different stages and within 90 min of each other
    if (prev.act.stage !== curr.act.stage) {
      var prevMin = timeToMin(prev.act.time);
      var currMin = timeToMin(curr.act.time);
      // assumed set length ~90 min; conflict if current starts before prev ends
      if (currMin - prevMin < 90 && currMin - prevMin > 0) return true;
    }
    return false;
  }

  var html = '';
  var totalConflicts = 0;
  var ratingSum = 0, ratingCount = 0;

  DAY_ORDER.forEach(function(d) {
    var acts = byDay[d];
    if (!acts.length) return;

    html += '<div class="day-section">';
    html += '<div class="day-label">' + DAY_LABELS[d] + '</div>';

    acts.forEach(function(item, i) {
      var act = item.act;
      var id  = item.id;
      var r   = getJRating(act.name);
      var rDisp = r !== null ? r : '–';

      var conflict = hasConflict(acts, i);
      if (conflict) {
        totalConflicts++;
        html += '<div class="conflict-row">⚠ Möglicher Overlap mit vorherigem Act</div>';
      }

      if (r !== null) { ratingSum += parseFloat(r); ratingCount++; }

      html += '<div class="plan-row stage-' + (act.stage||'') + '">';
      html += '<div class="ptime">' + (act.time||'') + '</div>';
      html += '<div class="pinfo">';
      html += '<div class="pname">' + act.name + '</div>';
      html += '<div class="psub">';
      html += '<span class="stage-chip ' + stageChipCls(act.stage) + '">' + stageLabel(act.stage) + '</span>';
      html += '</div></div>';
      html += '<div class="badge ' + badgeCls(r) + '">' + rDisp + '</div>';
      html += '<button type="button" class="remove-btn" data-remove-id="' + id + '">✕</button>';
      html += '</div>';
    });

    html += '</div>';
  });

  content.innerHTML = html;

  // Update stats
  document.getElementById('stat-total').textContent = keys.length;
  document.getElementById('stat-conflicts').textContent = totalConflicts;
  document.getElementById('stat-avg').textContent = ratingCount > 0 ? (ratingSum/ratingCount).toFixed(1) : '–';

  // Remove buttons
  content.querySelectorAll('.remove-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var id = this.dataset.removeId;
      delete myPlan[id];
      savePlan();
      render();
    });
  });
}

// Share as text
function shareAsText() {
  var lines = ['🔥 Mein BM2026 Plan\n'];
  DAY_ORDER.forEach(function(d) {
    var acts = Object.keys(myPlan)
      .filter(function(id) { return myPlan[id].day === d; })
      .map(function(id) { return myPlan[id]; })
      .sort(function(a,b) { return timeToMin(a.time)-timeToMin(b.time); });
    if (!acts.length) return;
    lines.push(DAY_SHORT[d]);
    acts.forEach(function(act) {
      lines.push('  ' + (act.time||'?') + ' ' + act.name + ' [' + stageLabel(act.stage) + ']');
    });
    lines.push('');
  });
  var text = lines.join('\n');
  if (navigator.share) {
    navigator.share({ title:'Mein BM2026 Plan', text:text });
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function() {
      alert('In Zwischenablage kopiert!');
    });
  } else {
    alert(text);
  }
}

// Event listeners
document.addEventListener('click', function(e) {
  if (e.target.id === 'btn-share') { shareAsText(); return; }
  if (e.target.id === 'btn-clear-all') {
    if (confirm('Wirklich alle Acts aus dem Plan löschen?')) {
      myPlan = {};
      savePlan();
      render();
    }
    return;
  }
});

// Init
render();

})();
</script>
</body>
</html>
